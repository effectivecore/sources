<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout via "display: grid"</title>
    <style>
        body {
          margin: 0;
          padding: 20px;
          font-family: 'Arial';
          font-size: 16px;
          line-height: 1.5em;
          background: lavender;
        }

        [data-area][data-group-id='body'] {
          display: block;
          min-width: 200px;
          max-width: 800px;
          box-sizing: border-box;
          margin: 0 auto;
          padding: 20px;
          background: white;
        }

        /* grid */

        x-grid-manager {
          display: grid;
        }

        x-grid-manager[data-type='grid-x5'] {
          grid-template-columns: repeat(5, 1fr);
          grid-template-rows: repeat(5, 100px);
        }

        x-grid-item {
          display: block;
          margin: 5px;
          background-color: whitesmoke;
        }

        /* scaler */

        [data-type^='scaler'] {
          display: inline-block;
          margin: 0;
          padding: 0;
          appearance: none;
          user-select: none;
         -webkit-appearance: none;
         -webkit-user-select: none;
          cursor: pointer;
          border: 1px solid black;
        }

        [data-type^='scaler']:checked {
          background: deepskyblue;
        }

        [data-type='scaler-x'] {width: 20px; height: 10px}
        [data-type='scaler-y'] {width: 10px; height: 21px}
        [data-type='scaler-x'] {margin-right: -6px}
        [data-type='scaler-y'][value='1'] {position: absolute; margin-left: -13px; margin-top:  20px}
        [data-type='scaler-y'][value='2'] {position: absolute; margin-left: -13px; margin-top:  40px}
        [data-type='scaler-y'][value='3'] {position: absolute; margin-left: -13px; margin-top:  60px}
        [data-type='scaler-y'][value='4'] {position: absolute; margin-left: -13px; margin-top:  80px}
        [data-type='scaler-y'][value='5'] {position: absolute; margin-left: -13px; margin-top: 100px}

        [data-type='scaler-x']:checked[value='1'] ~ [data-type='grid-x5'] {grid-template-columns: repeat(1, 1fr)}
        [data-type='scaler-x']:checked[value='2'] ~ [data-type='grid-x5'] {grid-template-columns: repeat(2, 1fr)}
        [data-type='scaler-x']:checked[value='3'] ~ [data-type='grid-x5'] {grid-template-columns: repeat(3, 1fr)}
        [data-type='scaler-x']:checked[value='4'] ~ [data-type='grid-x5'] {grid-template-columns: repeat(4, 1fr)}
        [data-type='scaler-x']:checked[value='5'] ~ [data-type='grid-x5'] {grid-template-columns: repeat(5, 1fr)}

        [data-type='scaler-x']:checked[value='4'] ~ [data-type='grid-x5'] x-grid-item[data-path-x^='12345'],
        [data-type='scaler-x']:checked[value='3'] ~ [data-type='grid-x5'] x-grid-item[data-path-x^='1234' ],
        [data-type='scaler-x']:checked[value='2'] ~ [data-type='grid-x5'] x-grid-item[data-path-x^='123'  ],
        [data-type='scaler-x']:checked[value='1'] ~ [data-type='grid-x5'] x-grid-item[data-path-x^='12'   ] {display: none}

        [data-type='scaler-y']:checked[value='1'] ~ [data-type='grid-x5'] {grid-template-rows: repeat(1, 100px)}
        [data-type='scaler-y']:checked[value='2'] ~ [data-type='grid-x5'] {grid-template-rows: repeat(2, 100px)}
        [data-type='scaler-y']:checked[value='3'] ~ [data-type='grid-x5'] {grid-template-rows: repeat(3, 100px)}
        [data-type='scaler-y']:checked[value='4'] ~ [data-type='grid-x5'] {grid-template-rows: repeat(4, 100px)}
        [data-type='scaler-y']:checked[value='5'] ~ [data-type='grid-x5'] {grid-template-rows: repeat(5, 100px)}

        [data-type='scaler-y']:checked[value='4'] ~ [data-type='grid-x5'] x-grid-item[data-path-y^='12345'],
        [data-type='scaler-y']:checked[value='3'] ~ [data-type='grid-x5'] x-grid-item[data-path-y^='1234' ],
        [data-type='scaler-y']:checked[value='2'] ~ [data-type='grid-x5'] x-grid-item[data-path-y^='123'  ],
        [data-type='scaler-y']:checked[value='1'] ~ [data-type='grid-x5'] x-grid-item[data-path-y^='12'   ] {display: none}
    </style>
</head>
<body>

    <x-part data-area data-group-id="body">

        <input data-type="scaler-y" type="radio" name="y" value="1">
        <input data-type="scaler-y" type="radio" name="y" value="2">
        <input data-type="scaler-y" type="radio" name="y" value="3">
        <input data-type="scaler-y" type="radio" name="y" value="4">
        <input data-type="scaler-y" type="radio" name="y" value="5" checked>

        <input data-type="scaler-x" type="radio" name="x" value="1">
        <input data-type="scaler-x" type="radio" name="x" value="2">
        <input data-type="scaler-x" type="radio" name="x" value="3">
        <input data-type="scaler-x" type="radio" name="x" value="4">
        <input data-type="scaler-x" type="radio" name="x" value="5" checked>

        <x-grid-manager data-type="grid-x5">
            <x-grid-item data-path-x="1"     data-path-y="1"    >1.1</x-grid-item>
            <x-grid-item data-path-x="12"    data-path-y="1"    >1.2</x-grid-item>
            <x-grid-item data-path-x="123"   data-path-y="1"    >1.3</x-grid-item>
            <x-grid-item data-path-x="1234"  data-path-y="1"    >1.4</x-grid-item>
            <x-grid-item data-path-x="12345" data-path-y="1"    >1.5</x-grid-item>
            <x-grid-item data-path-x="1"     data-path-y="12"   >2.1</x-grid-item>
            <x-grid-item data-path-x="12"    data-path-y="12"   >2.2</x-grid-item>
            <x-grid-item data-path-x="123"   data-path-y="12"   >2.3</x-grid-item>
            <x-grid-item data-path-x="1234"  data-path-y="12"   >2.4</x-grid-item>
            <x-grid-item data-path-x="12345" data-path-y="12"   >2.5</x-grid-item>
            <x-grid-item data-path-x="1"     data-path-y="123"  >3.1</x-grid-item>
            <x-grid-item data-path-x="12"    data-path-y="123"  >3.2</x-grid-item>
            <x-grid-item data-path-x="123"   data-path-y="123"  >3.3</x-grid-item>
            <x-grid-item data-path-x="1234"  data-path-y="123"  >3.4</x-grid-item>
            <x-grid-item data-path-x="12345" data-path-y="123"  >3.5</x-grid-item>
            <x-grid-item data-path-x="1"     data-path-y="1234" >4.1</x-grid-item>
            <x-grid-item data-path-x="12"    data-path-y="1234" >4.2</x-grid-item>
            <x-grid-item data-path-x="123"   data-path-y="1234" >4.3</x-grid-item>
            <x-grid-item data-path-x="1234"  data-path-y="1234" >4.4</x-grid-item>
            <x-grid-item data-path-x="12345" data-path-y="1234" >4.5</x-grid-item>
            <x-grid-item data-path-x="1"     data-path-y="12345">5.1</x-grid-item>
            <x-grid-item data-path-x="12"    data-path-y="12345">5.2</x-grid-item>
            <x-grid-item data-path-x="123"   data-path-y="12345">5.3</x-grid-item>
            <x-grid-item data-path-x="1234"  data-path-y="12345">5.4</x-grid-item>
            <x-grid-item data-path-x="12345" data-path-y="12345">5.5</x-grid-item>
        </x-grid-manager>

    </x-part>

</body>
</html>

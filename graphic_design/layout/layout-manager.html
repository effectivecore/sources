<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout Manager</title>
    <style>
        body {
          margin: 0;
          padding: 20px;
          font-family: 'Arial';
          font-size: 16px;
          line-height: 1.5em;
          background: #30184d;
        }

        [data-area][data-group-id='body'] {
          display: block;
          min-width:  200px;
          max-width: 1000px;
          box-sizing: border-box;
          margin: 0 auto;
        }

        /* grid */

        [data-grid-manager] {
          display: grid;
        }

        [data-grid-manager] * {
          user-select: none;
         -webkit-user-select: none;
        }

        [data-grid-manager][data-type='grid-x5'] {
          grid-template-columns: repeat(5,   1fr);
          grid-template-rows   : repeat(5, 100px);
        }

        [data-grid-item] {
          display: block;
          margin: 1px;
          padding: 20px;
          color: white;
          text-align: center;
          border: 1px solid #7d6599;
          background: #4a3466;
        }

        /* grid fixer */

        [data-type='grid-x5'] *[data-path-x='1'    ] {grid-column-start: 1}
        [data-type='grid-x5'] *[data-path-x='12'   ] {grid-column-start: 2}
        [data-type='grid-x5'] *[data-path-x='123'  ] {grid-column-start: 3}
        [data-type='grid-x5'] *[data-path-x='1234' ] {grid-column-start: 4}
        [data-type='grid-x5'] *[data-path-x='12345'] {grid-column-start: 5}
        [data-type='grid-x5'] *[data-path-y='1'    ] {grid-row-start: 1}
        [data-type='grid-x5'] *[data-path-y='12'   ] {grid-row-start: 2}
        [data-type='grid-x5'] *[data-path-y='123'  ] {grid-row-start: 3}
        [data-type='grid-x5'] *[data-path-y='1234' ] {grid-row-start: 4}
        [data-type='grid-x5'] *[data-path-y='12345'] {grid-row-start: 5}

        /* scaler */

        [data-type^='scaler'] {
          appearance: none;
         -webkit-appearance: none;
          display: inline-block;
          position: relative;
          width: 12px;
          height: 12px;
          margin: 0;
          padding: 0;
          cursor: pointer;
          border: 1px solid black;
          background: white;
        }

        [data-type^='scaler-x-'] {height: 8px}
        [data-type^='scaler-y-'] {width:  8px}

        [data-type^='scaler']:checked {
          background: deepskyblue;
        }

        [data-type^='scaler']:disabled {
          background: silver;
        }

        /* scaler for grid */

        [data-type='scaler-x-grid'],
        [data-type='scaler-y-grid'] {position: absolute}
        [data-type='scaler-x-grid'][value='1'] {margin-left:  20px; margin-top: -11px}
        [data-type='scaler-x-grid'][value='2'] {margin-left:  31px; margin-top: -11px}
        [data-type='scaler-x-grid'][value='3'] {margin-left:  42px; margin-top: -11px}
        [data-type='scaler-x-grid'][value='4'] {margin-left:  53px; margin-top: -11px}
        [data-type='scaler-x-grid'][value='5'] {margin-left:  64px; margin-top: -11px}
        [data-type='scaler-y-grid'][value='1'] {margin-left: -11px; margin-top:  20px}
        [data-type='scaler-y-grid'][value='2'] {margin-left: -11px; margin-top:  31px}
        [data-type='scaler-y-grid'][value='3'] {margin-left: -11px; margin-top:  42px}
        [data-type='scaler-y-grid'][value='4'] {margin-left: -11px; margin-top:  53px}
        [data-type='scaler-y-grid'][value='5'] {margin-left: -11px; margin-top:  64px}

        [data-type='scaler-x-grid'][value='1']:checked ~ [data-type='grid-x5'] {grid-template-columns: repeat(1, 1fr)}
        [data-type='scaler-x-grid'][value='2']:checked ~ [data-type='grid-x5'] {grid-template-columns: repeat(2, 1fr)}
        [data-type='scaler-x-grid'][value='3']:checked ~ [data-type='grid-x5'] {grid-template-columns: repeat(3, 1fr)}
        [data-type='scaler-x-grid'][value='4']:checked ~ [data-type='grid-x5'] {grid-template-columns: repeat(4, 1fr)}
        [data-type='scaler-x-grid'][value='5']:checked ~ [data-type='grid-x5'] {grid-template-columns: repeat(5, 1fr)}
        [data-type='scaler-x-grid'][value='1']:checked ~ [data-type='grid-x5'] *[data-path-x^='12'   ],
        [data-type='scaler-x-grid'][value='2']:checked ~ [data-type='grid-x5'] *[data-path-x^='123'  ],
        [data-type='scaler-x-grid'][value='3']:checked ~ [data-type='grid-x5'] *[data-path-x^='1234' ],
        [data-type='scaler-x-grid'][value='4']:checked ~ [data-type='grid-x5'] *[data-path-x^='12345'] {display: none}

        [data-type='scaler-y-grid'][value='1']:checked ~ [data-type='grid-x5'] {grid-template-rows: repeat(1, 100px)}
        [data-type='scaler-y-grid'][value='2']:checked ~ [data-type='grid-x5'] {grid-template-rows: repeat(2, 100px)}
        [data-type='scaler-y-grid'][value='3']:checked ~ [data-type='grid-x5'] {grid-template-rows: repeat(3, 100px)}
        [data-type='scaler-y-grid'][value='4']:checked ~ [data-type='grid-x5'] {grid-template-rows: repeat(4, 100px)}
        [data-type='scaler-y-grid'][value='5']:checked ~ [data-type='grid-x5'] {grid-template-rows: repeat(5, 100px)}
        [data-type='scaler-y-grid'][value='1']:checked ~ [data-type='grid-x5'] *[data-path-y^='12'   ],
        [data-type='scaler-y-grid'][value='2']:checked ~ [data-type='grid-x5'] *[data-path-y^='123'  ],
        [data-type='scaler-y-grid'][value='3']:checked ~ [data-type='grid-x5'] *[data-path-y^='1234' ],
        [data-type='scaler-y-grid'][value='4']:checked ~ [data-type='grid-x5'] *[data-path-y^='12345'] {display: none}

        /* scaler for item */

        [data-type='scaler-x-item'][value='1'] {left: 20px; top:  5px}
        [data-type='scaler-x-item'][value='2'] {left: 31px; top:  5px}
        [data-type='scaler-x-item'][value='3'] {left: 42px; top:  5px}
        [data-type='scaler-x-item'][value='4'] {left: 53px; top:  5px}
        [data-type='scaler-x-item'][value='5'] {left: 64px; top:  5px}
        [data-type='scaler-y-item'][value='1'] {left:  5px; top: 20px}
        [data-type='scaler-y-item'][value='2'] {left:  5px; top: 31px}
        [data-type='scaler-y-item'][value='3'] {left:  5px; top: 42px}
        [data-type='scaler-y-item'][value='4'] {left:  5px; top: 53px}
        [data-type='scaler-y-item'][value='5'] {left:  5px; top: 64px}

        [data-type='scaler-x-item'][data-path-x='1'][data-path-y='1'][value='1']:checked ~ [data-grid-item][data-path-x='1'][data-path-y='1'] {grid-column-end: 2}
        [data-type='scaler-x-item'][data-path-x='1'][data-path-y='1'][value='2']:checked ~ [data-grid-item][data-path-x='1'][data-path-y='1'] {grid-column-end: 3}
        [data-type='scaler-x-item'][data-path-x='1'][data-path-y='1'][value='3']:checked ~ [data-grid-item][data-path-x='1'][data-path-y='1'] {grid-column-end: 4}
        [data-type='scaler-x-item'][data-path-x='1'][data-path-y='1'][value='4']:checked ~ [data-grid-item][data-path-x='1'][data-path-y='1'] {grid-column-end: 5}
        [data-type='scaler-x-item'][data-path-x='1'][data-path-y='1'][value='5']:checked ~ [data-grid-item][data-path-x='1'][data-path-y='1'] {grid-column-end: 6}
        [data-type='scaler-y-item'][data-path-x='1'][data-path-y='1'][value='1']:checked ~ [data-grid-item][data-path-x='1'][data-path-y='1'] {grid-row-end: 2}
        [data-type='scaler-y-item'][data-path-x='1'][data-path-y='1'][value='2']:checked ~ [data-grid-item][data-path-x='1'][data-path-y='1'] {grid-row-end: 3}
        [data-type='scaler-y-item'][data-path-x='1'][data-path-y='1'][value='3']:checked ~ [data-grid-item][data-path-x='1'][data-path-y='1'] {grid-row-end: 4}
        [data-type='scaler-y-item'][data-path-x='1'][data-path-y='1'][value='4']:checked ~ [data-grid-item][data-path-x='1'][data-path-y='1'] {grid-row-end: 5}
        [data-type='scaler-y-item'][data-path-x='1'][data-path-y='1'][value='5']:checked ~ [data-grid-item][data-path-x='1'][data-path-y='1'] {grid-row-end: 6}
        [data-type='scaler-x-item'][data-path-x='1'][data-path-y='1'],
        [data-type='scaler-y-item'][data-path-x='1'][data-path-y='1'] {z-index: 50}
        [data-grid-item][data-path-x='1'][data-path-y='1'] {z-index: 49}

        [data-type='scaler-x-item'][data-path-x='12'][data-path-y='1'][value='2']:checked ~ [data-grid-item][data-path-x='12'][data-path-y='1'] {grid-column-end: 3}
        [data-type='scaler-x-item'][data-path-x='12'][data-path-y='1'][value='3']:checked ~ [data-grid-item][data-path-x='12'][data-path-y='1'] {grid-column-end: 4}
        [data-type='scaler-x-item'][data-path-x='12'][data-path-y='1'][value='4']:checked ~ [data-grid-item][data-path-x='12'][data-path-y='1'] {grid-column-end: 5}
        [data-type='scaler-x-item'][data-path-x='12'][data-path-y='1'][value='5']:checked ~ [data-grid-item][data-path-x='12'][data-path-y='1'] {grid-column-end: 6}
        [data-type='scaler-y-item'][data-path-x='12'][data-path-y='1'][value='1']:checked ~ [data-grid-item][data-path-x='12'][data-path-y='1'] {grid-row-end: 2}
        [data-type='scaler-y-item'][data-path-x='12'][data-path-y='1'][value='2']:checked ~ [data-grid-item][data-path-x='12'][data-path-y='1'] {grid-row-end: 3}
        [data-type='scaler-y-item'][data-path-x='12'][data-path-y='1'][value='3']:checked ~ [data-grid-item][data-path-x='12'][data-path-y='1'] {grid-row-end: 4}
        [data-type='scaler-y-item'][data-path-x='12'][data-path-y='1'][value='4']:checked ~ [data-grid-item][data-path-x='12'][data-path-y='1'] {grid-row-end: 5}
        [data-type='scaler-y-item'][data-path-x='12'][data-path-y='1'][value='5']:checked ~ [data-grid-item][data-path-x='12'][data-path-y='1'] {grid-row-end: 6}
        [data-type='scaler-x-item'][data-path-x='12'][data-path-y='1'],
        [data-type='scaler-y-item'][data-path-x='12'][data-path-y='1'] {z-index: 48}
        [data-grid-item][data-path-x='12'][data-path-y='1'] {z-index: 47}

        [data-type='scaler-x-item'][data-path-x='123'][data-path-y='1'][value='3']:checked ~ [data-grid-item][data-path-x='123'][data-path-y='1'] {grid-column-end: 4}
        [data-type='scaler-x-item'][data-path-x='123'][data-path-y='1'][value='4']:checked ~ [data-grid-item][data-path-x='123'][data-path-y='1'] {grid-column-end: 5}
        [data-type='scaler-x-item'][data-path-x='123'][data-path-y='1'][value='5']:checked ~ [data-grid-item][data-path-x='123'][data-path-y='1'] {grid-column-end: 6}
        [data-type='scaler-y-item'][data-path-x='123'][data-path-y='1'][value='1']:checked ~ [data-grid-item][data-path-x='123'][data-path-y='1'] {grid-row-end: 2}
        [data-type='scaler-y-item'][data-path-x='123'][data-path-y='1'][value='2']:checked ~ [data-grid-item][data-path-x='123'][data-path-y='1'] {grid-row-end: 3}
        [data-type='scaler-y-item'][data-path-x='123'][data-path-y='1'][value='3']:checked ~ [data-grid-item][data-path-x='123'][data-path-y='1'] {grid-row-end: 4}
        [data-type='scaler-y-item'][data-path-x='123'][data-path-y='1'][value='4']:checked ~ [data-grid-item][data-path-x='123'][data-path-y='1'] {grid-row-end: 5}
        [data-type='scaler-y-item'][data-path-x='123'][data-path-y='1'][value='5']:checked ~ [data-grid-item][data-path-x='123'][data-path-y='1'] {grid-row-end: 6}
        [data-type='scaler-x-item'][data-path-x='123'][data-path-y='1'],
        [data-type='scaler-y-item'][data-path-x='123'][data-path-y='1'] {z-index: 46}
        [data-grid-item][data-path-x='123'][data-path-y='1'] {z-index: 45}

        [data-type='scaler-x-item'][data-path-x='1234'][data-path-y='1'][value='4']:checked ~ [data-grid-item][data-path-x='1234'][data-path-y='1'] {grid-column-end: 5}
        [data-type='scaler-x-item'][data-path-x='1234'][data-path-y='1'][value='5']:checked ~ [data-grid-item][data-path-x='1234'][data-path-y='1'] {grid-column-end: 6}
        [data-type='scaler-y-item'][data-path-x='1234'][data-path-y='1'][value='1']:checked ~ [data-grid-item][data-path-x='1234'][data-path-y='1'] {grid-row-end: 2}
        [data-type='scaler-y-item'][data-path-x='1234'][data-path-y='1'][value='2']:checked ~ [data-grid-item][data-path-x='1234'][data-path-y='1'] {grid-row-end: 3}
        [data-type='scaler-y-item'][data-path-x='1234'][data-path-y='1'][value='3']:checked ~ [data-grid-item][data-path-x='1234'][data-path-y='1'] {grid-row-end: 4}
        [data-type='scaler-y-item'][data-path-x='1234'][data-path-y='1'][value='4']:checked ~ [data-grid-item][data-path-x='1234'][data-path-y='1'] {grid-row-end: 5}
        [data-type='scaler-y-item'][data-path-x='1234'][data-path-y='1'][value='5']:checked ~ [data-grid-item][data-path-x='1234'][data-path-y='1'] {grid-row-end: 6}
        [data-type='scaler-x-item'][data-path-x='1234'][data-path-y='1'],
        [data-type='scaler-y-item'][data-path-x='1234'][data-path-y='1'] {z-index: 44}
        [data-grid-item][data-path-x='1234'][data-path-y='1'] {z-index: 43}

        [data-type='scaler-x-item'][data-path-x='12345'][data-path-y='1'][value='5']:checked ~ [data-grid-item][data-path-x='12345'][data-path-y='1'] {grid-column-end: 6}
        [data-type='scaler-y-item'][data-path-x='12345'][data-path-y='1'][value='1']:checked ~ [data-grid-item][data-path-x='12345'][data-path-y='1'] {grid-row-end: 2}
        [data-type='scaler-y-item'][data-path-x='12345'][data-path-y='1'][value='2']:checked ~ [data-grid-item][data-path-x='12345'][data-path-y='1'] {grid-row-end: 3}
        [data-type='scaler-y-item'][data-path-x='12345'][data-path-y='1'][value='3']:checked ~ [data-grid-item][data-path-x='12345'][data-path-y='1'] {grid-row-end: 4}
        [data-type='scaler-y-item'][data-path-x='12345'][data-path-y='1'][value='4']:checked ~ [data-grid-item][data-path-x='12345'][data-path-y='1'] {grid-row-end: 5}

        [data-grid-item][data-path-x='12345'][data-path-y='1'] {z-index: 41}
    </style>
</head>
<body>

    <x-part data-area data-group-id="body">

        <input data-type="scaler-x-grid" type="radio" name="grid_x" value="1">
        <input data-type="scaler-x-grid" type="radio" name="grid_x" value="2">
        <input data-type="scaler-x-grid" type="radio" name="grid_x" value="3">
        <input data-type="scaler-x-grid" type="radio" name="grid_x" value="4">
        <input data-type="scaler-x-grid" type="radio" name="grid_x" value="5" checked>
        <input data-type="scaler-y-grid" type="radio" name="grid_y" value="1">

        <input data-type="scaler-y-grid" type="radio" name="grid_y" value="5" checked>
        <x-grid-manager data-grid-manager data-type="grid-x5">

            <input data-type="scaler-x-item" data-path-x="1" data-path-y="1" type="radio" name="item_x[1-1]" value="1" checked>
            <input data-type="scaler-x-item" data-path-x="1" data-path-y="1" type="radio" name="item_x[1-1]" value="2">
            <input data-type="scaler-x-item" data-path-x="1" data-path-y="1" type="radio" name="item_x[1-1]" value="3">

            <input data-type="scaler-y-item" data-path-x="1" data-path-y="1" type="radio" name="item_y[1-1]" value="5">
            <x-grid-item data-grid-item      data-path-x="1" data-path-y="1">GRID 1.1</x-grid-item>

            <input data-type="scaler-x-item" data-path-x="12" data-path-y="1" type="radio" name="item_x[1-2]" value="1" disabled>

            <input data-type="scaler-y-item" data-path-x="12" data-path-y="1" type="radio" name="item_y[1-2]" value="5">
            <x-grid-item data-grid-item      data-path-x="12" data-path-y="1">GRID 1.2</x-grid-item>

            <input data-type="scaler-x-item" data-path-x="123" data-path-y="1" type="radio" name="item_x[1-3]" value="1" disabled>

            <input data-type="scaler-y-item" data-path-x="123" data-path-y="1" type="radio" name="item_y[1-3]" value="2">
            <input data-type="scaler-y-item" data-path-x="123" data-path-y="1" type="radio" name="item_y[1-3]" value="3">

            <x-grid-item data-grid-item      data-path-x="123" data-path-y="1">GRID 1.3</x-grid-item>
